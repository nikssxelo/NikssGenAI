<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal AI Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        
        /* Loading Screen */
        #loading {
            position: fixed;
            inset: 0;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .dark #loading { background: #1e1e1e; color: white; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #374151; }

        /* Mobile Adjustments */
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        
        /* Markdown Styling */
        .prose pre {
            background: #f3f4f6;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin: 0.5rem 0;
        }
        .dark .prose pre { background: #111827; }
        .prose code { font-size: 0.875rem; color: #eb5757; }
        
        /* Input area safety */
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-gray-50 dark:bg-[#131314] text-gray-900 dark:text-gray-100 min-h-screen flex flex-col">

    <div id="loading">
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="font-medium">Initializing Workspace...</p>
        </div>
    </div>

    <div id="app" class="hidden flex h-screen overflow-hidden">
        
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-white dark:bg-[#1e1e1f] border-r border-gray-200 dark:border-gray-800 transform -translate-x-full lg:translate-x-0 sidebar-transition flex flex-col">
            <div class="p-4 flex items-center justify-between">
                <button onclick="createNewChat()" class="flex items-center gap-3 px-4 py-3 bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 rounded-2xl w-full font-medium hover:bg-blue-100 dark:hover:bg-blue-900/30 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    New Chat
                </button>
            </div>

            <div id="chat-list" class="flex-1 overflow-y-auto px-3 space-y-1">
                </div>

            <div class="p-4 border-t border-gray-200 dark:border-gray-800 space-y-2">
                <button onclick="toggleSettings()" class="flex items-center gap-3 w-full p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    Settings
                </button>
                <button onclick="toggleDarkMode()" class="flex items-center gap-3 w-full p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition text-sm">
                    <span id="dark-mode-icon">🌙</span>
                    <span id="dark-mode-text">Dark Mode</span>
                </button>
            </div>
        </aside>

        <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden"></div>

        <main class="flex-1 flex flex-col relative w-full lg:ml-0 overflow-hidden">
            <header class="h-14 flex items-center justify-between px-4 border-b border-gray-200 dark:border-gray-800 bg-white/80 dark:bg-[#131314]/80 backdrop-blur-md z-30">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 -ml-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
                <div class="font-semibold text-lg">Gemini <span class="text-blue-500 text-sm font-normal">Clone</span></div>
                <div id="model-badge" class="text-xs px-2 py-1 bg-gray-100 dark:bg-gray-800 rounded-md truncate max-w-[150px]"></div>
            </header>

            <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-6 pb-32">
                <div id="welcome-screen" class="h-full flex flex-col items-center justify-center text-center p-8 space-y-4">
                    <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500 bg-clip-text text-transparent">Hello, User</h1>
                    <p class="text-gray-500 max-w-md">How can I help you today? Connect your OpenRouter API key in settings to start.</p>
                </div>
            </div>

            <div class="absolute bottom-0 inset-x-0 p-4 bg-gradient-to-t from-gray-50 dark:from-[#131314] via-gray-50 dark:via-[#131314] to-transparent">
                <div class="max-w-4xl mx-auto relative group">
                    <textarea id="user-input" rows="1" placeholder="Enter a prompt here" class="w-full p-4 pr-16 bg-white dark:bg-[#1e1e1f] border border-gray-200 dark:border-gray-700 rounded-2xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 resize-none transition-all" style="min-height: 56px; max-height: 200px;"></textarea>
                    <button id="send-btn" onclick="sendMessage()" class="absolute right-3 bottom-3 p-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                    </button>
                </div>
                <p class="text-[10px] text-center mt-2 text-gray-400">Gemini Clone may display inaccurate info, so double-check its responses.</p>
                <div class="safe-bottom"></div>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div class="bg-white dark:bg-[#1e1e1f] rounded-3xl w-full max-w-md p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold">Settings</h3>
                <button onclick="toggleSettings()" class="text-gray-500 hover:text-black dark:hover:text-white">&times;</button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">OpenRouter API Key</label>
                    <input type="password" id="api-key-input" placeholder="sk-or-v1-..." class="w-full p-3 bg-gray-50 dark:bg-black/20 border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Model Identifier</label>
                    <input type="text" id="model-input" placeholder="deepseek/deepseek-r1:free" class="w-full p-3 bg-gray-50 dark:bg-black/20 border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">System Prompt</label>
                    <textarea id="system-prompt-input" rows="3" placeholder="You are a helpful assistant..." class="w-full p-3 bg-gray-50 dark:bg-black/20 border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none resize-none"></textarea>
                </div>
                <button onclick="saveSettings()" class="w-full py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition">Save & Apply</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * STATE MANAGEMENT
         */
        let state = {
            chats: JSON.parse(localStorage.getItem('gemini_chats') || '[]'),
            currentChatId: localStorage.getItem('gemini_current_chat_id') || null,
            settings: JSON.parse(localStorage.getItem('gemini_settings') || '{"apiKey":"","model":"deepseek/deepseek-r1:free","systemPrompt":"You are a helpful, concise AI assistant.","darkMode":false}'),
            isStreaming: false
        };

        /**
         * INITIALIZATION
         */
        window.addEventListener('DOMContentLoaded', () => {
            initUI();
            renderChatList();
            if (state.currentChatId) loadChat(state.currentChatId);
            
            // Hide loader
            setTimeout(() => {
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('app').classList.remove('hidden');
                }, 500);
            }, 800);
        });

        function initUI() {
            // Apply theme
            if (state.settings.darkMode) {
                document.documentElement.classList.add('dark');
                updateThemeToggleUI(true);
            }
            
            // Sync settings to inputs
            document.getElementById('api-key-input').value = state.settings.apiKey;
            document.getElementById('model-input').value = state.settings.model;
            document.getElementById('system-prompt-input').value = state.settings.systemPrompt;
            document.getElementById('model-badge').innerText = state.settings.model.split('/').pop();

            // Textarea auto-resize
            const textarea = document.getElementById('user-input');
            textarea.addEventListener('input', () => {
                textarea.style.height = 'auto';
                textarea.style.height = (textarea.scrollHeight) + 'px';
            });
            
            // Enter key to send
            textarea.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey && window.innerWidth > 768) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        }

        /**
         * CORE CHAT LOGIC
         */
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            
            if (!text || state.isStreaming) return;
            if (!state.settings.apiKey) {
                alert('Please add your OpenRouter API key in settings first.');
                toggleSettings();
                return;
            }

            // Create chat if none exists
            if (!state.currentChatId) {
                createNewChat(text.substring(0, 30));
            }

            const currentChat = state.chats.find(c => c.id === state.currentChatId);
            
            // Add user message
            const userMsg = { role: 'user', content: text, id: Date.now() };
            currentChat.messages.push(userMsg);
            
            input.value = '';
            input.style.height = 'auto';
            renderMessages();
            saveState();

            // Prepare AI message placeholder
            state.isStreaming = true;
            const aiMsgId = Date.now() + 1;
            const aiMsg = { role: 'assistant', content: '', id: aiMsgId };
            currentChat.messages.push(aiMsg);
            renderMessages();

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${state.settings.apiKey}`,
                        "HTTP-Referer": window.location.href,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: state.settings.model,
                        messages: [
                            { role: "system", content: state.settings.systemPrompt },
                            ...currentChat.messages.slice(0, -1).map(m => ({ role: m.role, content: m.content }))
                        ],
                        stream: true
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullContent = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n').filter(line => line.trim() !== '');
                    
                    for (const line of lines) {
                        if (line.includes('data: [DONE]')) break;
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.replace('data: ', ''));
                                const token = data.choices[0]?.delta?.content || "";
                                fullContent += token;
                                
                                // Update state and UI
                                aiMsg.content = fullContent;
                                updateLiveMessage(aiMsgId, fullContent);
                            } catch (e) { console.error("Error parsing stream", e); }
                        }
                    }
                }
            } catch (error) {
                aiMsg.content = "⚠️ Error: " + error.message;
                renderMessages();
            } finally {
                state.isStreaming = false;
                saveState();
            }
        }

        /**
         * UI RENDERING
         */
        function renderMessages() {
            const container = document.getElementById('chat-container');
            const welcome = document.getElementById('welcome-screen');
            const chat = state.chats.find(c => c.id === state.currentChatId);

            if (!chat || chat.messages.length === 0) {
                welcome.classList.remove('hidden');
                container.innerHTML = '';
                container.appendChild(welcome);
                return;
            }

            welcome.classList.add('hidden');
            container.innerHTML = chat.messages.map(m => `
                <div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-2 duration-300">
                    <div class="max-w-[85%] lg:max-w-[70%] flex gap-3 ${m.role === 'user' ? 'flex-row-reverse' : 'flex-row'}">
                        <div class="w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center text-xs font-bold ${m.role === 'user' ? 'bg-blue-600 text-white' : 'bg-gray-200 dark:bg-gray-700'}">
                            ${m.role === 'user' ? 'U' : 'AI'}
                        </div>
                        <div class="space-y-1">
                            <div id="msg-${m.id}" class="prose dark:prose-invert text-sm sm:text-base leading-relaxed break-words p-3 rounded-2xl ${m.role === 'user' ? 'bg-gray-100 dark:bg-gray-800' : ''}">
                                ${marked.parse(m.content || '...')}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
            
            container.scrollTop = container.scrollHeight;
        }

        function updateLiveMessage(id, content) {
            const el = document.getElementById(`msg-${id}`);
            if (el) {
                el.innerHTML = marked.parse(content + ' ▎');
                const container = document.getElementById('chat-container');
                container.scrollTop = container.scrollHeight;
            }
        }

        function renderChatList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = state.chats.map(chat => `
                <div class="group relative flex items-center gap-2 p-3 rounded-xl cursor-pointer transition ${state.currentChatId === chat.id ? 'bg-gray-100 dark:bg-gray-800' : 'hover:bg-gray-50 dark:hover:bg-gray-800/50'}" onclick="loadChat('${chat.id}')">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                    <span class="text-sm truncate pr-8">${chat.title}</span>
                    <button onclick="event.stopPropagation(); deleteChat('${chat.id}')" class="absolute right-2 opacity-0 group-hover:opacity-100 p-1 hover:text-red-500 transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                    </button>
                </div>
            `).reverse().join('');
        }

        /**
         * ACTIONS & UTILS
         */
        function createNewChat(title = "New Chat") {
            const id = Date.now().toString();
            state.chats.push({ id, title, messages: [] });
            state.currentChatId = id;
            saveState();
            renderChatList();
            renderMessages();
            if (window.innerWidth < 1024) toggleSidebar();
        }

        function loadChat(id) {
            state.currentChatId = id;
            saveState();
            renderChatList();
            renderMessages();
            if (window.innerWidth < 1024) toggleSidebar();
        }

        function deleteChat(id) {
            state.chats = state.chats.filter(c => c.id !== id);
            if (state.currentChatId === id) state.currentChatId = null;
            saveState();
            renderChatList();
            renderMessages();
        }
